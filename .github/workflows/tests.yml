name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (CPU-only subset)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff sqlglot sqlparse pglast \
                      fastapi httpx pydantic pydantic-settings pyyaml loguru \
                      datasets click rich tqdm tenacity python-dotenv \
                      "huggingface_hub>=0.27"
          pip install -e . --no-deps

      - name: Lint
        run: ruff check src tests

      - name: Tests
        run: pytest tests -q --cov=src/slonik --cov-report=term-missing
        env:
          TOKENIZERS_PARALLELISM: "false"
